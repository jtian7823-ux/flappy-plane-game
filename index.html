<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Plane</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0a1a;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#gameContainer {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  display: block;
  max-width: 100%;
  max-height: 100%;
}

/* ===== Landing overlay ===== */
#landing {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 70%, #0f0c29 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  transition: opacity 0.6s ease;
  overflow: hidden;
}
#landing.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Particle canvas behind landing content */
#landingParticles {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.landing-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#landing h1 {
  font-size: clamp(2.5rem, 10vw, 5rem);
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 0 40px rgba(255,69,58,0.8),
    0 0 80px rgba(255,69,58,0.4),
    0 4px 12px rgba(0,0,0,0.5);
  margin-bottom: 0.3em;
  letter-spacing: 0.08em;
  animation: titleGlow 2.5s ease-in-out infinite;
}

@keyframes titleGlow {
  0%, 100% { transform: scale(1); text-shadow: 0 0 40px rgba(255,69,58,0.8), 0 0 80px rgba(255,69,58,0.4), 0 4px 12px rgba(0,0,0,0.5); }
  50% { transform: scale(1.04); text-shadow: 0 0 60px rgba(255,69,58,1), 0 0 120px rgba(255,69,58,0.6), 0 4px 12px rgba(0,0,0,0.5); }
}

#landing .subtitle {
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  color: rgba(255,255,255,0.7);
  margin-bottom: 0.5em;
  font-weight: 300;
  letter-spacing: 0.05em;
}

#landing .tagline {
  font-size: clamp(0.75rem, 2.5vw, 1rem);
  color: rgba(255,255,255,0.4);
  margin-bottom: 2.5em;
  font-style: italic;
}

/* Animated plane on landing */
.landing-plane {
  width: clamp(120px, 30vw, 220px);
  margin-bottom: 1.5em;
  animation: floatPlane 3s ease-in-out infinite;
  filter: drop-shadow(0 8px 24px rgba(230,57,70,0.4));
}

@keyframes floatPlane {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-20px) rotate(3deg); }
}

#playBtn {
  padding: 18px 56px;
  font-size: clamp(1.1rem, 4.5vw, 1.5rem);
  font-weight: 800;
  color: #fff;
  background: linear-gradient(135deg, #e63946 0%, #c1121f 50%, #a00010 100%);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 60px;
  cursor: pointer;
  box-shadow:
    0 6px 30px rgba(230,57,70,0.6),
    0 0 60px rgba(230,57,70,0.3),
    inset 0 1px 0 rgba(255,255,255,0.2);
  transition: all 0.3s ease;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
#playBtn:hover {
  transform: translateY(-3px) scale(1.08);
  box-shadow:
    0 10px 40px rgba(230,57,70,0.8),
    0 0 80px rgba(230,57,70,0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
}
#playBtn:active {
  transform: translateY(0) scale(0.97);
}

/* ===== PWA CTA Button (shared style) ===== */
.pwa-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  font-size: clamp(0.85rem, 3.5vw, 1.15rem);
  font-weight: 800;
  color: #fff;
  background: linear-gradient(135deg, #ff9500 0%, #ff6a00 50%, #e55d00 100%);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 50px;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: all 0.3s ease;
  animation: ctaPulse 2s ease-in-out infinite;
  box-shadow:
    0 4px 20px rgba(255,149,0,0.5),
    0 0 40px rgba(255,149,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.25);
}
.pwa-cta:hover {
  transform: translateY(-2px) scale(1.06);
  box-shadow:
    0 8px 35px rgba(255,149,0,0.7),
    0 0 60px rgba(255,149,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.3);
}
.pwa-cta:active {
  transform: translateY(0) scale(0.97);
}
.pwa-cta .cta-icon {
  font-size: 1.3em;
  line-height: 1;
}
.pwa-cta .cta-text-main {
  font-weight: 900;
  text-transform: uppercase;
}
.pwa-cta .cta-text-sub {
  font-size: 0.7em;
  font-weight: 400;
  opacity: 0.85;
  display: block;
  margin-top: 1px;
}

@keyframes ctaPulse {
  0%, 100% {
    box-shadow: 0 4px 20px rgba(255,149,0,0.5), 0 0 40px rgba(255,149,0,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  50% {
    box-shadow: 0 4px 30px rgba(255,149,0,0.8), 0 0 60px rgba(255,149,0,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
  }
}

/* Landing page CTA position */
#landingCta {
  margin-top: 1.2em;
}

/* In-game floating CTA */
#gameCta {
  position: fixed;
  z-index: 55;
  pointer-events: auto;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  transform: translateY(10px);
}
#gameCta.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ===== Score HUD ===== */
#scoreHUD {
  position: fixed;
  top: 20px; left: 0; right: 0;
  text-align: center;
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#scoreHUD.visible {
  opacity: 1;
}
#scoreHUD span {
  font-size: clamp(2.5rem, 10vw, 5rem);
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 2px 8px rgba(0,0,0,0.6),
    0 0 30px rgba(255,255,255,0.3);
  transition: transform 0.15s ease;
  display: inline-block;
}
#scoreHUD span.pop {
  transform: scale(1.4);
}

/* Score flash overlay */
#scoreFlash {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.08);
  pointer-events: none;
  z-index: 45;
  opacity: 0;
  transition: opacity 0.05s ease;
}
#scoreFlash.flash {
  opacity: 1;
}
</style>
</head>
<body>

<!-- Landing Page -->
<div id="landing">
  <canvas id="landingParticles"></canvas>
  <div class="landing-content">
    <img class="landing-plane" src="plane.png" alt="Red Biplane" />
    <h1>FLAPPY PLANE</h1>
    <p class="subtitle">How far can you fly?</p>
    <p class="tagline">Tap to fly. Dodge the obstacles. Beat your best.</p>
    <button id="playBtn">PLAY NOW</button>
    <a id="landingCta" class="pwa-cta" href="#" target="_blank" rel="noopener">
      <span class="cta-icon">🎁</span>
      <span>
        <span class="cta-text-main">GET THE APP</span>
        <span class="cta-text-sub">Exclusive rewards inside</span>
      </span>
    </a>
  </div>
</div>

<!-- Score display -->
<div id="scoreHUD"><span id="scoreText">0</span></div>

<!-- Score flash -->
<div id="scoreFlash"></div>

<!-- In-game floating CTA (shown during ready & dead states) -->
<a id="gameCta" class="pwa-cta" href="#" target="_blank" rel="noopener">
  <span class="cta-icon">🎁</span>
  <span>
    <span class="cta-text-main">GET THE APP</span>
    <span class="cta-text-sub">Exclusive rewards inside</span>
  </span>
</a>

<!-- Game canvas -->
<div id="gameContainer">
  <canvas id="game"></canvas>
</div>

<script>
(function() {
  'use strict';

  // ============ MARKETING CONFIG ============
  // Client-specific settings — change these per client
  const MKT = {
    // PWA install URL — replace with client's PWA URL
    PWA_URL: 'https://example.com/install',
    // CTA text (can be customized per client)
    CTA_MAIN: 'GET THE APP',
    CTA_SUB: 'Exclusive rewards inside',
    CTA_ICON: '🎁',
  };

  // Apply config to CTA buttons
  document.querySelectorAll('.pwa-cta').forEach(btn => {
    btn.href = MKT.PWA_URL;
    btn.querySelector('.cta-text-main').textContent = MKT.CTA_MAIN;
    btn.querySelector('.cta-text-sub').textContent = MKT.CTA_SUB;
    btn.querySelector('.cta-icon').textContent = MKT.CTA_ICON;
  });

  // ============ CONFIG ============
  const CFG = {
    // World
    W: 400,
    H: 700,
    GRAVITY: 0.4,
    // Plane
    FLAP: -6,
    PLANE_W: 60,
    PLANE_H: 36,
    MAX_VEL: 10,
    ROTATION_SPEED: 3,
    // Pipes
    PIPE_W: 65,
    PIPE_GAP: 165,
    PIPE_SPEED: 2.5,
    PIPE_INTERVAL: 1600,
    // Visuals
    CLOUD_COUNT: 6,
    PARTICLE_COUNT: 25,
    STAR_COUNT: 30,
  };

  // ============ STATE ============
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const landing = document.getElementById('landing');
  const playBtn = document.getElementById('playBtn');
  const scoreHUD = document.getElementById('scoreHUD');
  const scoreText = document.getElementById('scoreText');
  const scoreFlash = document.getElementById('scoreFlash');
  const gameCta = document.getElementById('gameCta');

  let state = 'landing'; // landing | ready | playing | dying | dead
  let plane, pipes, clouds, particles, score, bestScore, lastPipeTime, frameCount;
  let groundOffset = 0;
  let stars = [];
  let screenShake = 0;
  let isNewBest = false;
  let scorePopTimer = 0;

  // Preload plane image
  const planeImg = new Image();
  planeImg.src = 'plane.png';
  let planeImgReady = false;
  planeImg.onload = () => { planeImgReady = true; };

  bestScore = parseInt(localStorage.getItem('flappyPlaneBest') || '0');

  // ============ CTA POSITIONING ============
  function updateCtaPosition() {
    if (state === 'ready' || state === 'dead') {
      gameCta.classList.add('visible');
      // Position at bottom of canvas
      const rect = canvas.getBoundingClientRect();
      const ctaH = gameCta.offsetHeight;
      gameCta.style.left = rect.left + 'px';
      gameCta.style.width = rect.width + 'px';
      gameCta.style.top = (rect.bottom - ctaH - 16) + 'px';
      gameCta.style.display = 'flex';
      gameCta.style.justifyContent = 'center';
    } else {
      gameCta.classList.remove('visible');
    }
  }

  // ============ LANDING PARTICLES ============
  (function initLandingParticles() {
    const lc = document.getElementById('landingParticles');
    const lctx = lc.getContext('2d');
    const dots = [];
    const DOT_COUNT = 60;

    function resizeLanding() {
      lc.width = window.innerWidth;
      lc.height = window.innerHeight;
    }
    resizeLanding();
    window.addEventListener('resize', resizeLanding);

    for (let i = 0; i < DOT_COUNT; i++) {
      dots.push({
        x: Math.random() * lc.width,
        y: Math.random() * lc.height,
        r: 1 + Math.random() * 2.5,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -0.3 - Math.random() * 0.7,
        alpha: 0.2 + Math.random() * 0.5,
      });
    }

    function drawLandingParticles() {
      if (state !== 'landing') return;
      lctx.clearRect(0, 0, lc.width, lc.height);
      dots.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        if (d.y < -10) { d.y = lc.height + 10; d.x = Math.random() * lc.width; }
        if (d.x < -10) d.x = lc.width + 10;
        if (d.x > lc.width + 10) d.x = -10;

        lctx.beginPath();
        lctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        lctx.fillStyle = `rgba(230,57,70,${d.alpha})`;
        lctx.fill();

        // Glow
        lctx.beginPath();
        lctx.arc(d.x, d.y, d.r * 3, 0, Math.PI * 2);
        lctx.fillStyle = `rgba(230,57,70,${d.alpha * 0.15})`;
        lctx.fill();
      });
      requestAnimationFrame(drawLandingParticles);
    }
    drawLandingParticles();
  })();

  // ============ RESPONSIVE CANVAS ============
  function resizeCanvas() {
    const ratio = CFG.W / CFG.H;
    let w = window.innerWidth;
    let h = window.innerHeight;
    if (w / h > ratio) {
      canvas.style.height = h + 'px';
      canvas.style.width = (h * ratio) + 'px';
    } else {
      canvas.style.width = w + 'px';
      canvas.style.height = (w / ratio) + 'px';
    }
    canvas.width = CFG.W;
    canvas.height = CFG.H;
    updateCtaPosition();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ============ DRAWING HELPERS ============

  // Sky gradient — warm sunset tones
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, CFG.H);
    grad.addColorStop(0, '#1a73e8');
    grad.addColorStop(0.3, '#4fc3f7');
    grad.addColorStop(0.55, '#81d4fa');
    grad.addColorStop(0.75, '#ffe0b2');
    grad.addColorStop(0.88, '#ffab40');
    grad.addColorStop(1, '#4CAF50');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }

  // Background floating stars/sparkles
  function createStars() {
    stars = [];
    for (let i = 0; i < CFG.STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * CFG.W,
        y: Math.random() * CFG.H * 0.6,
        r: 0.5 + Math.random() * 1.5,
        twinkleSpeed: 0.02 + Math.random() * 0.04,
        offset: Math.random() * Math.PI * 2,
      });
    }
  }

  function drawStars() {
    stars.forEach(s => {
      const alpha = 0.2 + Math.sin(frameCount * s.twinkleSpeed + s.offset) * 0.2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
  }

  // Clouds
  function createClouds() {
    clouds = [];
    for (let i = 0; i < CFG.CLOUD_COUNT; i++) {
      clouds.push({
        x: Math.random() * CFG.W * 1.5,
        y: 30 + Math.random() * (CFG.H * 0.35),
        w: 60 + Math.random() * 80,
        speed: 0.3 + Math.random() * 0.5,
        opacity: 0.15 + Math.random() * 0.3,
      });
    }
  }

  function drawClouds() {
    clouds.forEach(c => {
      ctx.save();
      ctx.globalAlpha = c.opacity;
      ctx.fillStyle = '#fff';
      const h = c.w * 0.4;
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w * 0.5, h * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x - c.w * 0.25, c.y + h * 0.1, c.w * 0.3, h * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.25, c.y + h * 0.05, c.w * 0.35, h * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function updateClouds() {
    clouds.forEach(c => {
      c.x -= c.speed;
      if (c.x < -c.w) {
        c.x = CFG.W + c.w;
        c.y = 30 + Math.random() * (CFG.H * 0.35);
      }
    });
  }

  // Ground — richer with layered depth
  const GROUND_H = 80;
  function drawGround() {
    const y = CFG.H - GROUND_H;

    // Dirt with gradient
    const dirtGrad = ctx.createLinearGradient(0, y + 20, 0, CFG.H);
    dirtGrad.addColorStop(0, '#8B6914');
    dirtGrad.addColorStop(0.5, '#7A5C10');
    dirtGrad.addColorStop(1, '#6B4F0C');
    ctx.fillStyle = dirtGrad;
    ctx.fillRect(0, y + 20, CFG.W, GROUND_H - 20);

    // Grass top with richer gradient
    const grassGrad = ctx.createLinearGradient(0, y, 0, y + 22);
    grassGrad.addColorStop(0, '#66BB6A');
    grassGrad.addColorStop(0.4, '#4CAF50');
    grassGrad.addColorStop(1, '#388E3C');
    ctx.fillStyle = grassGrad;
    ctx.fillRect(0, y, CFG.W, 22);

    // Grass blades
    ctx.strokeStyle = '#2E7D32';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < CFG.W; i += 10) {
      const offset = ((i + groundOffset) % CFG.W + CFG.W) % CFG.W;
      ctx.beginPath();
      ctx.moveTo(offset, y);
      ctx.quadraticCurveTo(offset - 2, y - 5, offset - 4, y - 8);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(offset + 5, y);
      ctx.quadraticCurveTo(offset + 7, y - 3, offset + 9, y - 5);
      ctx.stroke();
    }

    // Top edge highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(CFG.W, y);
    ctx.stroke();
  }

  // Plane (image-based) with enhanced exhaust
  function drawPlane(x, y, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation * Math.PI / 180);

    const w = CFG.PLANE_W;
    const h = CFG.PLANE_H;
    const hw = w / 2;
    const hh = h / 2;

    // Enhanced exhaust when flying
    if (state === 'playing') {
      // Trail smoke
      for (let i = 0; i < 5; i++) {
        const ex = -hw - 5 - Math.random() * 25;
        const ey = (Math.random() - 0.5) * 10;
        const er = 2 + Math.random() * 4;
        const alpha = 0.35 - i * 0.06;
        ctx.beginPath();
        ctx.arc(ex, ey, er, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,220,220,${Math.max(0, alpha)})`;
        ctx.fill();
      }
      // Hot exhaust glow
      ctx.beginPath();
      ctx.arc(-hw - 3, 0, 4, 0, Math.PI * 2);
      const exGrad = ctx.createRadialGradient(-hw - 3, 0, 0, -hw - 3, 0, 6);
      exGrad.addColorStop(0, 'rgba(255,200,50,0.4)');
      exGrad.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = exGrad;
      ctx.fill();
    }

    if (planeImgReady) {
      const drawW = w * 1.3;
      const drawH = drawW * (planeImg.naturalHeight / planeImg.naturalWidth);
      ctx.drawImage(planeImg, -drawW / 2, -drawH / 2, drawW, drawH);
    } else {
      ctx.fillStyle = '#c1121f';
      ctx.beginPath();
      ctx.ellipse(0, 0, hw * 0.85, hh * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Pipes — enhanced 3D look with shadows
  function drawPipe(pipe) {
    const x = pipe.x;
    const gapY = pipe.gapY;
    const gapH = CFG.PIPE_GAP;
    const w = CFG.PIPE_W;
    const topH = gapY - gapH / 2;
    const botY = gapY + gapH / 2;
    const botH = CFG.H - GROUND_H - botY;

    // Drop shadow behind pipes
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    if (topH > 0) ctx.fillRect(x + 4, 0, w, topH + 4);
    if (botH > 0) ctx.fillRect(x + 4, botY, w, botH + 4);

    if (topH > 0) drawSinglePipe(x, 0, w, topH, true);
    if (botH > 0) drawSinglePipe(x, botY, w, botH, false);
  }

  function drawSinglePipe(x, y, w, h, isTop) {
    // Main body — richer gradient
    const grad = ctx.createLinearGradient(x, 0, x + w, 0);
    grad.addColorStop(0, '#388e3c');
    grad.addColorStop(0.15, '#43a047');
    grad.addColorStop(0.35, '#66bb6a');
    grad.addColorStop(0.5, '#81c784');
    grad.addColorStop(0.65, '#66bb6a');
    grad.addColorStop(0.85, '#43a047');
    grad.addColorStop(1, '#1b5e20');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);

    // Inner highlight stripe
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x + 8, y, 6, h);

    // Dark edge stripe
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(x + w - 8, y, 6, h);

    // Border
    ctx.strokeStyle = '#1b5e20';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    // Cap — more 3D
    const capH = 28;
    const capW = w + 14;
    const capX = x - 7;
    const capY = isTop ? y + h - capH : y;

    const capGrad = ctx.createLinearGradient(capX, 0, capX + capW, 0);
    capGrad.addColorStop(0, '#2e7d32');
    capGrad.addColorStop(0.2, '#43a047');
    capGrad.addColorStop(0.4, '#66bb6a');
    capGrad.addColorStop(0.5, '#81c784');
    capGrad.addColorStop(0.6, '#66bb6a');
    capGrad.addColorStop(0.8, '#43a047');
    capGrad.addColorStop(1, '#1b5e20');
    ctx.fillStyle = capGrad;
    ctx.fillRect(capX, capY, capW, capH);

    // Cap top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(capX + 2, capY + (isTop ? 0 : 0), capW - 4, 3);

    ctx.strokeStyle = '#1b5e20';
    ctx.lineWidth = 2;
    ctx.strokeRect(capX, capY, capW, capH);
  }

  // Particles on crash — more dramatic
  function createCrashParticles(x, y) {
    particles = [];
    const colors = ['#e63946', '#c1121f', '#ff6b6b', '#ffd166', '#ff9500', '#fff', '#555'];
    for (let i = 0; i < CFG.PARTICLE_COUNT; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 12,
        vy: (Math.random() - 0.5) * 12,
        r: 2 + Math.random() * 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,
        decay: 0.015 + Math.random() * 0.025,
      });
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      if (p.life > 0.5) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 2, 0, Math.PI * 2);
        ctx.globalAlpha = p.life * 0.3;
        ctx.fillStyle = `rgba(255,200,100,${p.life * 0.15})`;
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
  }

  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.25;
      p.vx *= 0.99;
      p.life -= p.decay;
      p.r *= 0.98;
    });
  }

  // Score popup particles (when scoring)
  let scorePops = [];
  function createScorePop(x, y) {
    for (let i = 0; i < 8; i++) {
      scorePops.push({
        x: x + (Math.random() - 0.5) * 30,
        y: y + (Math.random() - 0.5) * 30,
        vy: -1 - Math.random() * 2,
        r: 2 + Math.random() * 3,
        life: 1,
        color: ['#ffd166', '#ffab40', '#fff'][Math.floor(Math.random() * 3)],
      });
    }
  }

  function drawScorePops() {
    scorePops = scorePops.filter(p => p.life > 0);
    scorePops.forEach(p => {
      p.y += p.vy;
      p.life -= 0.03;
      p.r *= 0.97;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // Score display (in-game, on canvas for game over screen)
  function drawScoreOnCanvas(s, x, y, size) {
    ctx.font = `bold ${size}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 5;
    ctx.strokeText(s, x, y);
    ctx.fillText(s, x, y);
  }

  // Game Over overlay — redesigned
  function drawGameOver() {
    // Dim with vignette
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, CFG.W, CFG.H);

    // Extra vignette
    const vigGrad = ctx.createRadialGradient(CFG.W/2, CFG.H/2, CFG.H*0.3, CFG.W/2, CFG.H/2, CFG.H*0.7);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, CFG.W, CFG.H);

    // Panel — shifted up to make room for CTA
    const pw = 300, ph = 280;
    const px = (CFG.W - pw) / 2;
    const py = (CFG.H - ph) / 2 - 50;

    // Panel shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRectPath(px + 4, py + 4, pw, ph, 20);
    ctx.fill();

    // Panel background
    const panelGrad = ctx.createLinearGradient(px, py, px, py + ph);
    panelGrad.addColorStop(0, 'rgba(40,40,80,0.95)');
    panelGrad.addColorStop(1, 'rgba(20,20,50,0.98)');
    ctx.fillStyle = panelGrad;
    roundRectPath(px, py, pw, ph, 20);
    ctx.fill();

    // Panel border glow
    ctx.strokeStyle = 'rgba(230,57,70,0.3)';
    ctx.lineWidth = 2;
    roundRectPath(px, py, pw, ph, 20);
    ctx.stroke();

    // Inner border
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    roundRectPath(px + 4, py + 4, pw - 8, ph - 8, 18);
    ctx.stroke();

    // Title
    ctx.font = "bold 36px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e63946';
    ctx.shadowColor = 'rgba(230,57,70,0.5)';
    ctx.shadowBlur = 15;
    ctx.fillText('GAME OVER', CFG.W / 2, py + 50);
    ctx.shadowBlur = 0;

    // Divider line
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px + 30, py + 65);
    ctx.lineTo(px + pw - 30, py + 65);
    ctx.stroke();

    // Score section
    ctx.font = "15px 'Segoe UI', system-ui, sans-serif";
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('SCORE', CFG.W / 2, py + 90);
    ctx.font = "bold 48px 'Segoe UI', system-ui, sans-serif";
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(255,255,255,0.2)';
    ctx.shadowBlur = 10;
    ctx.fillText(score.toString(), CFG.W / 2, py + 138);
    ctx.shadowBlur = 0;

    // Best section
    ctx.font = "15px 'Segoe UI', system-ui, sans-serif";
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('BEST', CFG.W / 2, py + 165);

    // NEW BEST animation
    if (isNewBest) {
      const pulse = Math.sin(frameCount * 0.1) * 0.15 + 1;
      ctx.save();
      ctx.translate(CFG.W / 2, py + 195);
      ctx.scale(pulse, pulse);
      ctx.font = "bold 32px 'Segoe UI', system-ui, sans-serif";
      ctx.fillStyle = '#ffd166';
      ctx.shadowColor = 'rgba(255,209,102,0.6)';
      ctx.shadowBlur = 20;
      const scoreStr = bestScore.toString();
      const scoreWidth = ctx.measureText(scoreStr).width;
      ctx.fillText(scoreStr, 0, 0);
      ctx.shadowBlur = 0;

      // NEW badge
      ctx.font = "bold 11px 'Segoe UI', system-ui, sans-serif";
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('NEW!', scoreWidth / 2 + 8, -18);
      ctx.restore();
    } else {
      ctx.font = "bold 32px 'Segoe UI', system-ui, sans-serif";
      ctx.fillStyle = '#ffd166';
      ctx.fillText(bestScore.toString(), CFG.W / 2, py + 195);
    }

    // Star rating
    const starY = py + 225;
    const starSize = 18;
    const starCount = score >= 10 ? 3 : score >= 5 ? 2 : score >= 1 ? 1 : 0;
    for (let i = 0; i < 3; i++) {
      const sx = CFG.W / 2 + (i - 1) * 35;
      drawStar(sx, starY, starSize, i < starCount ? '#ffd166' : 'rgba(255,255,255,0.15)');
    }

    // Tap to restart
    const blink = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = blink;
    ctx.font = "bold 16px 'Segoe UI', system-ui, sans-serif";
    ctx.fillStyle = '#fff';
    ctx.fillText('TAP TO RESTART', CFG.W / 2, py + ph - 12);
    ctx.globalAlpha = 1;
  }

  // Draw 5-point star
  function drawStar(cx, cy, r, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    }
    ctx.closePath();
    ctx.fill();
    // Inner glow for filled stars
    if (color === '#ffd166') {
      ctx.shadowColor = 'rgba(255,209,102,0.5)';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  function roundRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // "Get Ready" overlay
  function drawReady() {
    const blink = Math.sin(frameCount * 0.06) * 0.3 + 0.7;

    // Instruction panel
    const pw = 220, ph = 80;
    const px = (CFG.W - pw) / 2;
    const py = CFG.H / 2 + 30;
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    roundRectPath(px, py, pw, ph, 12);
    ctx.fill();

    ctx.globalAlpha = blink;
    ctx.font = "bold 26px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 8;
    ctx.fillText('TAP TO START', CFG.W / 2, py + 35);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Tap icon
    ctx.save();
    ctx.translate(CFG.W / 2, py + 60);
    ctx.globalAlpha = blink * 0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    const ringSize = 12 + Math.sin(frameCount * 0.08) * 4;
    ctx.beginPath();
    ctx.arc(0, 0, ringSize, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // ============ GAME LOGIC ============

  function resetGame() {
    plane = {
      x: CFG.W * 0.25,
      y: CFG.H / 2,
      vel: 0,
      rotation: 0,
      targetRotation: 0,
    };
    pipes = [];
    particles = [];
    scorePops = [];
    score = 0;
    lastPipeTime = 0;
    frameCount = 0;
    groundOffset = 0;
    screenShake = 0;
    isNewBest = false;
    scorePopTimer = 0;
    scoreText.textContent = '0';
  }

  function flap() {
    plane.vel = CFG.FLAP;
    plane.targetRotation = -25;
  }

  function spawnPipe() {
    const minY = CFG.PIPE_GAP / 2 + 60;
    const maxY = CFG.H - GROUND_H - CFG.PIPE_GAP / 2 - 60;
    const gapY = minY + Math.random() * (maxY - minY);
    pipes.push({
      x: CFG.W + CFG.PIPE_W,
      gapY: gapY,
      scored: false,
    });
  }

  function checkCollision() {
    const hitW = CFG.PLANE_W * 0.35;
    const hitH = CFG.PLANE_H * 0.3;
    const px1 = plane.x - hitW;
    const px2 = plane.x + hitW;
    const py1 = plane.y - hitH;
    const py2 = plane.y + hitH;

    if (py2 >= CFG.H - GROUND_H) return true;
    if (py1 <= 0) return true;

    for (const pipe of pipes) {
      const pipeLeft = pipe.x;
      const pipeRight = pipe.x + CFG.PIPE_W;
      const gapTop = pipe.gapY - CFG.PIPE_GAP / 2;
      const gapBot = pipe.gapY + CFG.PIPE_GAP / 2;

      if (px2 > pipeLeft && px1 < pipeRight) {
        if (py1 < gapTop || py2 > gapBot) {
          return true;
        }
      }
    }
    return false;
  }

  function triggerScoreEffect() {
    // Flash screen
    scoreFlash.classList.add('flash');
    setTimeout(() => scoreFlash.classList.remove('flash'), 80);

    // Pop score text
    scoreText.classList.add('pop');
    setTimeout(() => scoreText.classList.remove('pop'), 150);

    // Spawn score particles at the gap the plane just passed
    createScorePop(plane.x + 30, plane.y);
  }

  let prevState = 'landing';
  function update() {
    frameCount++;

    if (screenShake > 0) screenShake *= 0.85;

    if (state === 'ready') {
      plane.y = CFG.H / 2 + Math.sin(frameCount * 0.05) * 15;
      plane.rotation = Math.sin(frameCount * 0.05) * 5;
      updateClouds();
      groundOffset -= CFG.PIPE_SPEED * 0.5;
    }

    if (state === 'playing') {
      plane.vel += CFG.GRAVITY;
      if (plane.vel > CFG.MAX_VEL) plane.vel = CFG.MAX_VEL;
      plane.y += plane.vel;

      if (plane.vel > 2) {
        plane.targetRotation = Math.min(70, plane.vel * 8);
      }
      const rotDiff = plane.targetRotation - plane.rotation;
      plane.rotation += rotDiff * 0.1;

      const now = performance.now();
      if (now - lastPipeTime > CFG.PIPE_INTERVAL) {
        spawnPipe();
        lastPipeTime = now;
      }

      pipes.forEach(p => {
        p.x -= CFG.PIPE_SPEED;
        if (!p.scored && p.x + CFG.PIPE_W < plane.x) {
          p.scored = true;
          score++;
          scoreText.textContent = score.toString();
          triggerScoreEffect();
        }
      });

      pipes = pipes.filter(p => p.x > -CFG.PIPE_W - 20);
      groundOffset -= CFG.PIPE_SPEED;

      if (checkCollision()) {
        state = 'dying';
        screenShake = 8;
        createCrashParticles(plane.x, plane.y);
        if (score > bestScore) {
          bestScore = score;
          isNewBest = true;
          localStorage.setItem('flappyPlaneBest', bestScore.toString());
        }
      }

      updateClouds();
    }

    if (state === 'dying') {
      plane.vel += CFG.GRAVITY;
      plane.y += plane.vel;
      plane.rotation += 5;
      updateParticles();

      if (plane.y > CFG.H + 50) {
        state = 'dead';
      }
    }

    if (state === 'dead') {
      updateParticles();
    }

    // Update CTA visibility on state change
    if (state !== prevState) {
      prevState = state;
      updateCtaPosition();
    }
  }

  function draw() {
    ctx.save();

    // Screen shake
    if (screenShake > 0.5) {
      const sx = (Math.random() - 0.5) * screenShake;
      const sy = (Math.random() - 0.5) * screenShake;
      ctx.translate(sx, sy);
    }

    drawSky();
    drawStars();
    drawClouds();

    // Pipes behind plane
    pipes.forEach(drawPipe);

    // Plane
    if (state !== 'dead') {
      drawPlane(plane.x, plane.y, plane.rotation);
    }

    // Particles
    if (particles.length > 0) drawParticles();

    // Score pops
    if (scorePops.length > 0) drawScorePops();

    // Ground (in front)
    drawGround();

    // UI
    if (state === 'ready') drawReady();
    if (state === 'dead') drawGameOver();

    ctx.restore();
  }

  // ============ MAIN LOOP ============
  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // ============ INPUT ============
  function handleInput(e) {
    e.preventDefault();

    if (state === 'ready') {
      state = 'playing';
      lastPipeTime = performance.now();
      scoreHUD.classList.add('visible');
      flap();
      return;
    }

    if (state === 'playing') {
      flap();
      return;
    }

    if (state === 'dead') {
      resetGame();
      state = 'ready';
      scoreHUD.classList.remove('visible');
      createClouds();
      return;
    }
  }

  canvas.addEventListener('mousedown', handleInput);
  canvas.addEventListener('touchstart', handleInput, { passive: false });
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      handleInput(e);
    }
  });

  // ============ LANDING → GAME ============
  playBtn.addEventListener('click', () => {
    landing.classList.add('hidden');
    resetGame();
    createClouds();
    createStars();
    state = 'ready';
    updateCtaPosition();
    setTimeout(() => { landing.style.display = 'none'; }, 600);
  });

  // ============ INIT ============
  resetGame();
  createClouds();
  createStars();
  gameLoop();

})();
</script>
